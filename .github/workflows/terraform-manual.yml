# Manual Terraform on the branch you select. Plan-only by default.
name: Terraform Manual

on:
  push:
    branches:
      - gcp-gce-metadata
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        default: 'riley'
        type: string
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: string
      action:
        description: 'Run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TF_VERSION: '1.7.0'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  SERVICE_ACCOUNT: 'terraform-github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project and environment
        run: |
          PROJECT="${{ inputs.project }}"
          ENV="${{ inputs.environment }}"
          ROOT="terraform/projects"
          DIR="$ROOT/$PROJECT/$ENV"
          
          echo "Available project / environment combinations:"
          for p in "$ROOT"/*/; do
            [ -d "$p" ] || continue
            pname=$(basename "$p")
            for e in "$p"*/; do
              [ -d "$e" ] || continue
              if ls "$e"/*.tf 1>/dev/null 2>&1; then
                ename=$(basename "$e")
                echo "  - $pname / $ename"
              fi
            done
          done
          
          if [[ ! -d "$DIR" ]]; then
            echo "::error::Directory does not exist: $DIR"
            exit 1
          fi
          if ! ls "$DIR"/*.tf 1>/dev/null 2>&1; then
            echo "::error::No .tf files in $DIR (not a Terraform project root)"
            exit 1
          fi
          echo "Using $DIR"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/projects/${{ inputs.project || 'riley' }}/${{ inputs.environment || 'dev' }}
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/projects/${{ inputs.project || 'riley' }}/${{ inputs.environment || 'dev' }}
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        working-directory: terraform/projects/${{ inputs.project || 'riley' }}/${{ inputs.environment || 'dev' }}
        run: terraform apply -auto-approve -no-color
