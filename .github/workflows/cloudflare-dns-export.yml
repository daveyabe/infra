# Export Cloudflare DNS zones to BIND-format files and retain as workflow artifacts.
# See docs/cloudflare-dns-export.md for spec and setup.
name: Cloudflare DNS export

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  EXPORT_DIR: cloudflare/dns-exports
  EXPORT_DELAY_SEC: 25

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export DNS zones (BIND)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          EXPORT_DIR: ${{ env.EXPORT_DIR }}
          EXPORT_DELAY_SEC: ${{ env.EXPORT_DELAY_SEC }}
        run: bash cloudflare/scripts/export-dns-zones.sh

      - name: Upload DNS exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-dns-exports-${{ github.run_number }}
          path: ${{ env.EXPORT_DIR }}/
          retention-days: 90
